<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>МетаВселенная</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen">
    <div class="login-box">
      <div class="logo-row">
        <!-- Lucide globe-2 icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
             fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
          <path d="M2 12h20"/>
        </svg>
        <h1>МетаВселенная</h1>
      </div>
      <p class="subtitle">Войди и исследуй 3D мир</p>
      <label class="field-label">Имя</label>
      <input type="text" id="player-name" placeholder="Твоё имя" maxlength="20" autocomplete="off">
      <label class="field-label">Цвет аватара</label>
      <div class="color-row">
        <input type="color" id="player-color" value="#f97316">
        <span id="color-preview" class="color-swatch"></span>
      </div>
      <button id="enter-btn">
        <!-- Lucide log-in icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" x2="3" y1="12" y2="12"/>
        </svg>
        Войти в мир
      </button>
    </div>
  </div>

  <!-- Game UI -->
  <div id="game-ui" style="display:none">

    <!-- Top bar -->
    <div id="top-bar">
      <div id="players-box">
        <!-- Lucide users icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 1-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span id="players-count">Игроков: 1</span>
      </div>
      <div id="controls-hint">WASD — движение &nbsp;|&nbsp; Мышь — поворот &nbsp;|&nbsp; Пробел — прыжок &nbsp;|&nbsp; T — чат &nbsp;|&nbsp; Z — микрофон</div>
    </div>

    <!-- Chat -->
    <div id="chat-container">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input type="text" id="chat-input" placeholder="Напишите сообщение... (T)" autocomplete="off">
        <button id="chat-send" title="Отправить">
          <!-- Lucide send icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m22 2-7 20-4-9-9-4Z"/>
            <path d="M22 2 11 13"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Voice button -->
    <div id="voice-panel">
      <button id="voice-btn" title="Включить голосовой чат">
        <!-- mic (shown when OFF) -->
        <svg id="icon-mic" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" x2="12" y1="19" y2="22"/>
        </svg>
        <!-- volume-2 (shown when ON) -->
        <svg id="icon-vol" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <span id="voice-label">Голос</span>
      </button>
    </div>

    <!-- Crosshair (CSS-only, no emoji) -->
    <div id="crosshair"></div>

  </div>

  <!-- Canvas -->
  <canvas id="canvas"></canvas>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <!-- Socket.io -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Game scripts -->
  <script src="js/world.js"></script>
  <script src="js/player.js"></script>
  <script src="js/network.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/main.js"></script>

  <script>
    // Color swatch preview
    const colorInput  = document.getElementById('player-color');
    const colorSwatch = document.getElementById('color-preview');
    const updateSwatch = () => { colorSwatch.style.background = colorInput.value; };
    colorInput.addEventListener('input', updateSwatch);
    updateSwatch();
  </script>

</body>
</html>
